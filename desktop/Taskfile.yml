version: '3'

tasks:
    default:
        desc: Run the desktop app
        deps:
            - assets
        cmds:
            - go run .

    build:
        desc: Build the desktop app binary
        deps:
            - assets
        cmds:
            - go build -o bin/pelagica .

    package:macos:
        desc: Build a macOS .app bundle for the desktop app (unsigned/ad-hoc)
        deps:
            - assets
        preconditions:
            - sh: '[ "{{OS}}" = "darwin" ]'
              msg: desktop:package only supports macOS
        cmds:
            - go build -o bin/pelagica .
            - rm -rf bin/Pelagica.app
            - mkdir -p bin/Pelagica.app/Contents/MacOS
            - mkdir -p bin/Pelagica.app/Contents/Resources
            - cp build/appicon.icns bin/Pelagica.app/Contents/Resources/icons.icns
            - cp bin/pelagica bin/Pelagica.app/Contents/MacOS/
            - cp build/darwin/Info.plist bin/Pelagica.app/Contents/
            - xattr -cr bin/Pelagica.app # strips resource forks/quarantine flags icon tools leave behind, which codesign rejects
            - codesign --force --deep --sign - bin/Pelagica.app

    installer:macos:
        desc: Build a macOS .dmg installer for the desktop app (unsigned), with a drag-to-Applications layout
        deps:
            - package:macos
        preconditions:
            - sh: '[ "{{OS}}" = "darwin" ]'
              msg: desktop:installer only supports macOS
            - sh: command -v create-dmg
              msg: 'create-dmg is required. Install it with: brew install create-dmg'
        cmds:
            - rm -f bin/Pelagica.dmg
            - rm -rf bin/dmg-staging
            - mkdir -p bin/dmg-staging
            - cp -r bin/Pelagica.app bin/dmg-staging/
            - create-dmg --volname "Pelagica" --volicon "build/driveicon.icns" --window-size 660 400 --icon-size 100 --icon "Pelagica.app" 175 190 --hide-extension "Pelagica.app" --app-drop-link 480 190 "bin/Pelagica.dmg" "bin/dmg-staging"
            - rm -rf bin/dmg-staging

    package:windows:
        desc: Build a Windows .exe for the desktop app, with the app icon and version info embedded (unsigned)
        deps:
            - assets
        preconditions:
            - sh: '[ "{{OS}}" = "windows" ]'
              msg: desktop:package:windows only supports Windows
        cmds:
            - wails3 generate syso -arch amd64 -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_amd64.syso
            - go build -trimpath -ldflags="-w -s -H windowsgui" -o bin/pelagica.exe .
            - rm -f wails_windows_amd64.syso

    installer:windows:
        desc: Build a Windows NSIS installer (.exe) for the desktop app (unsigned)
        deps:
            - package:windows
        preconditions:
            - sh: '[ "{{OS}}" = "windows" ]'
              msg: desktop:installer:windows only supports Windows
            - sh: command -v makensis
              msg: 'makensis (NSIS) is required. Install it with: winget install NSIS.NSIS'
        cmds:
            - task: webview2:bootstrapper
            - makensis -DARG_WAILS_AMD64_BINARY="..\..\..\bin\pelagica.exe" project.nsi
        dir: build/windows/nsis

    webview2:bootstrapper:
        internal: true
        status:
            - test -f build/windows/nsis/MicrosoftEdgeWebview2Setup.exe
        cmds:
            - wails3 generate webview2bootstrapper -dir build/windows/nsis

    install:
        internal: true
        sources:
            - go.mod
            - go.sum
        cmds:
            - go mod download

    assets:
        internal: true
        deps:
            - install
            - :build-frontend-desktop
        cmds:
            - rm -rf frontend/dist
            - mkdir -p frontend/dist
            - cp -r ../frontend/dist/. frontend/dist/
