version: '3'

includes:
    frontend:
        taskfile: ./frontend/Taskfile.yml
        dir: ./frontend
        flatten: true
    backend:
        taskfile: ./backend/Taskfile.yml
        dir: ./backend
        flatten: true
    desktop:
        taskfile: ./desktop/Taskfile.yml
        dir: ./desktop

tasks:
    dev:
        desc: Start backend and frontend in parallel
        deps:
            - backend
            - frontend

    checkup:
        desc: Run all checks (lint, format, and tests)
        deps:
            - lint
            - format:check

    version:
        desc: "Set the app version everywhere it's tracked (usage: task version VERSION=1.2.3)"
        preconditions:
            - sh: '[ -n "{{.VERSION}}" ]'
              msg: "Usage: task version VERSION=1.2.3"
        cmds:
            - task: set-frontend-version
              vars:
                  VERSION: '{{.VERSION}}'
            - cmd: 'perl -i -pe "s/APP_VERSION: ''.*''/APP_VERSION: ''{{.VERSION}}''/" backend/Taskfile.yml'
            - cmd: 'perl -i -pe "s/^    version: ''.*''/    version: ''{{.VERSION}}''/" desktop/build/config.yml'
            - cmd: 'perl -i -0777 -pe "s/(<key>CFBundleVersion<\/key>\s*<string>)[^<]*(<\/string>)/\${1}{{.VERSION}}\${2}/" desktop/build/darwin/Info.plist'
            - cmd: 'perl -i -0777 -pe "s/(<key>CFBundleShortVersionString<\/key>\s*<string>)[^<]*(<\/string>)/\${1}{{.VERSION}}\${2}/" desktop/build/darwin/Info.plist'
            - 'echo "Version set to {{.VERSION}} in frontend/package.json, backend/Taskfile.yml, desktop/build/config.yml, and desktop/build/darwin/Info.plist"'

    docker:
        desc: Build and run the local Docker image
        cmds:
            - docker compose -f docker-compose.local.yml up --build

    docker:stop:
        desc: Stop the local Docker container
        cmds:
            - docker compose -f docker-compose.local.yml down

    stats:
        desc: Count the amount of lines of code
        cmds:
            - cloc . --exclude-dir=dist,node_modules --not-match-f="(pnpm-lock|package-lock|yarn\.lock)"
