version: '3'

tasks:
    backend:
        desc: Start Go backend
        deps:
            - install-backend
        env:
            APP_VERSION: '1.1.1'
            CONFIG_PATH: '{{.ROOT_DIR}}/dev.config.json'
            COLLECTOR_INSTANCE_ID_FILE: '{{.ROOT_DIR}}/config/instance_id'
            COLLECTOR_STATS_CONSENT_FILE: '{{.ROOT_DIR}}/config/stats_consent'
            LOG_FILE: '{{.ROOT_DIR}}/config/pelagica.log'
            COLLECTOR_PING_BASE_URL: 'http://localhost:4000'
            COLLECTOR_PING_TOKEN: '2f64e07c-e930-463f-b118-556a741fb2aa'
            SERVERS_DIR: '{{.ROOT_DIR}}/config/servers'
            ENABLE_AUTH: 'true'
            LOG_LEVEL: 'debug'
            SERVER_ADDRESS: 'https://jellyfin.jan.run'
        cmds:
            - go run main.go

    install-backend:
        internal: true
        sources:
            - go.mod
            - go.sum
        cmds:
            - go mod download
